name: Manual Release

on:
  workflow_dispatch:
    inputs:
      custom_tag:
        description: 'Optional: Specify a custom tag (e.g. v2.0.0). If omitted, the version will be auto-incremented.'
        required: false
        type: string

permissions:
  contents: write

jobs:
  tag:
    name: Tag Assigner
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.determine_tag.outputs.tag }}
      changelog: ${{ steps.determine_tag.outputs.changelog }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag (Auto)
        if: ${{ github.event.inputs.custom_tag == '' }}
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch

      - name: Push custom tag (Manual)
        if: ${{ github.event.inputs.custom_tag != '' }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ github.event.inputs.custom_tag }}
          git push origin ${{ github.event.inputs.custom_tag }}

      - name: Determine outputs
        id: determine_tag
        run: |
          if [ "${{ github.event.inputs.custom_tag }}" != "" ]; then
            echo "tag=${{ github.event.inputs.custom_tag }}" >> "$GITHUB_OUTPUT"
            echo "changelog=" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ steps.tag_version.outputs.new_tag }}" >> "$GITHUB_OUTPUT"
            {
              echo "changelog<<__CHANGELOG__"
              echo "${{ steps.tag_version.outputs.changelog }}"
              echo "__CHANGELOG__"
            } >> "$GITHUB_OUTPUT"
          fi

  build-and-release:
    name: Build Binary & Release
    needs: tag
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev pkg-config build-essential

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""


      - name: Build Release Binary
        run: cargo build --release

      - name: Strip Binary
        run: strip target/release/vesper

      - name: Build Debian Package
        run: |
          cargo install cargo-deb
          cargo deb

      - name: Package Release Tarball
        run: |
          mkdir -p vesper-linux-x86_64
          cp target/release/vesper vesper-linux-x86_64/
          cp io.github.TheRealShek.vesper.desktop vesper-linux-x86_64/
          cp assets/logo.png vesper-linux-x86_64/
          cp Makefile vesper-linux-x86_64/
          tar -czf vesper-linux-x86_64.tar.gz vesper-linux-x86_64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.new_tag }}
          name: Release ${{ needs.tag.outputs.new_tag }}
          body: ${{ needs.tag.outputs.changelog }}
          generate_release_notes: ${{ needs.tag.outputs.changelog == '' }}
          files: |
            vesper-linux-x86_64.tar.gz
            target/debian/*.deb
