app-id: io.github.TheRealShek.vesper
runtime: org.gnome.Platform
runtime-version: '45'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: vesper
finish-args:
  # Hardware and Display
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  # Filesystem access for media (Read-Only)
  - --filesystem=xdg-pictures:ro
  - --filesystem=xdg-videos:ro
  - --filesystem=xdg-run/media:ro
  - --filesystem=/mnt:ro
build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/vesper/cargo
modules:
  - name: ffmpeg
    cleanup:
      - /include
      - /lib/pkgconfig
      - /share/doc
      - /share/man
    config-opts:
      - --disable-debug
      - --disable-doc
      - --disable-static
      - --enable-shared
      - --disable-ffplay
      - --disable-network
      - --disable-htmlpages
      - --disable-manpages
      - --disable-podpages
      - --disable-txtpages
    sources:
      - type: archive
        url: https://ffmpeg.org/releases/ffmpeg-6.1.1.tar.xz
        sha256: 8684f4b00f94b85461884c3719382f1261f0d9eb3d59640a1f4ac0873616f968

  - name: vesper
    buildsystem: simple
    build-options:
      build-args:
        - --share=network
    build-commands:
      - cargo build --release --locked
      - install -Dm755 target/release/vesper /app/bin/vesper
    sources:
      - type: dir
        path: .
